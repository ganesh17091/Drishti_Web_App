services:
  - type: web
    name: focuspath-backend
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    preDeployCommand: flask db upgrade
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120 --log-level info
    envVars:
      - key: FLASK_APP
        value: wsgi.py
      - key: PYTHON_VERSION
        value: 3.11.0
