{% extends 'base.html' %}

{% block content %}
<div class="auth-container" style="animation: fadeIn 0.5s ease-out;">
    <h2>Log In</h2>
    <form method="POST" action="{{ url_for('auth.login') }}">
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" required placeholder="student@college.edu">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>
        </div>
        <button type="submit" class="btn-primary btn-submit">Log In</button>
    </form>
    <div class="auth-links">
        <p>Don't have an account? <a href="{{ url_for('auth.signup') }}">Sign Up</a></p>
        <p><a href="#">Forgot Password?</a></p>
    </div>
</div>
{% endblock %}
