{% extends 'base.html' %}

{% block content %}
<div class="auth-container">
    <h2>Reset Password</h2>
    <p style="text-align: center; margin-bottom: 20px;">Enter your email to receive a password reset link.</p>
    <form method="POST" action="">
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" required>
        </div>
        <button type="submit" class="btn-primary btn-submit">Send Reset Link</button>
    </form>
    <div class="auth-links">
        <p><a href="{{ url_for('auth.login') }}">Back to Login</a></p>
    </div>
</div>
{% endblock %}
