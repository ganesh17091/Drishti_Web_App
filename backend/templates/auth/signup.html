{% extends 'base.html' %}

{% block content %}
<div class="auth-container" style="animation: fadeIn 0.5s ease-out;">
    <h2>Create an Account</h2>
    <form method="POST" action="{{ url_for('auth.signup') }}">
        <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" required placeholder="John Doe">
        </div>
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" required placeholder="student@college.edu">
        </div>
        
        <div class="form-row" style="display: flex; gap: 1rem;">
            <div class="form-group" style="flex: 1;">
                <label for="college">College</label>
                <input type="text" id="college" name="college" required>
            </div>
            <div class="form-group" style="flex: 1;">
                <label for="branch">Branch (e.g. CS, IT)</label>
                <input type="text" id="branch" name="branch" required>
            </div>
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>
        </div>
        <div class="form-group">
            <label for="confirm_password">Confirm Password</label>
            <input type="password" id="confirm_password" name="confirm_password" required>
        </div>
        <button type="submit" class="btn-primary btn-submit">Sign Up</button>
    </form>
    <div class="auth-links">
        <p>Already have an account? <a href="{{ url_for('auth.login') }}">Log In</a></p>
    </div>
</div>
{% endblock %}
