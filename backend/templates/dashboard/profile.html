{% extends 'base.html' %}

{% block content %}
<div class="auth-container" style="max-width: 600px;">
    <h2>Your Profile</h2>
    <form method="POST" action="">
        <div class="form-row" style="display: flex; gap: 1rem;">
            <div class="form-group" style="flex: 1;">
                <label for="name">Full Name</label>
                <input type="text" id="name" value="{{ current_user.name }}" disabled>
            </div>
            <div class="form-group" style="flex: 1;">
                <label for="email">Email</label>
                <input type="email" id="email" value="{{ current_user.email }}" disabled>
            </div>
        </div>
        
        <div class="form-row" style="display: flex; gap: 1rem;">
            <div class="form-group" style="flex: 1;">
                <label for="college">College</label>
                <input type="text" id="college" name="college" required value="{{ current_user.college or '' }}">
            </div>
            <div class="form-group" style="flex: 1;">
                <label for="branch">Branch</label>
                <input type="text" id="branch" name="branch" required value="{{ current_user.branch or '' }}">
            </div>
        </div>

        <div class="form-group">
            <label for="interests">Interests</label>
            <input type="text" id="interests" name="interests" placeholder="AI, Web Development..." value="{{ profile.interests if profile else '' }}">
        </div>

        <div class="form-group">
            <label for="skills">Current Skills (comma separated)</label>
            <input type="text" id="skills" name="skills" placeholder="Python, JavaScript..." value="{{ profile.skills_text if profile else '' }}">
        </div>

        <div class="form-group">
            <label for="career_goals">Career Goals</label>
            <textarea id="career_goals" name="career_goals" rows="3" placeholder="I want to be a Data Scientist...">{{ profile.career_goals if profile else '' }}</textarea>
        </div>

        <div class="form-group">
            <label for="study_hours">Preferred Study Hours per day</label>
            <input type="number" id="study_hours" name="study_hours" min="1" max="24" value="{{ profile.study_hours if profile else 2 }}">
        </div>

        <button type="submit" class="btn-primary btn-submit">Save Profile</button>
    </form>
</div>
{% endblock %}
