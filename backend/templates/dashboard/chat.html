{% extends 'base.html' %}

{% block content %}
<div class="dashboard-grid">
    <div class="main-content" style="max-width: 600px; margin: 0 auto; width: 100%;">
        <h2>AI Chat Assistant</h2>
        <div class="card" style="background: var(--card-bg); padding: 1.5rem; border-radius: 12px; height: 500px; display: flex; flex-direction: column;">
            <div id="chat-box" style="flex: 1; overflow-y: auto; margin-bottom: 1rem; padding-right: 10px;">
                <div style="margin-bottom: 1rem;">
                    <strong style="color: var(--secondary-color);">AI Assistant:</strong> How can I help you plan your career and studies today?
                </div>
            </div>
            <div style="display: flex; gap: 0.5rem;">
                <input type="text" id="chat-input" class="form-group" style="flex: 1; margin: 0; padding: 0.75rem; border-radius: 8px; background: rgba(15, 23, 42, 0.5); color: white; border: 1px solid var(--border-color);" placeholder="Ask me something...">
                <button onclick="sendMessage()" class="btn-primary">Send</button>
            </div>
        </div>
    </div>
</div>

<script>
async function sendMessage() {
    const input = document.getElementById('chat-input');
    const msg = input.value.trim();
    if(!msg) return;
    
    const box = document.getElementById('chat-box');
    box.innerHTML += `<div style="margin-bottom: 1rem; text-align: right;"><strong style="color: var(--primary-color);">You:</strong> ${msg}</div>`;
    input.value = '';
    
    try {
        const res = await fetch(`{{ url_for('ai.chatbot') }}`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({message: msg})
        });
        const data = await res.json();
        box.innerHTML += `<div style="margin-bottom: 1rem;"><strong style="color: var(--secondary-color);">AI Assistant:</strong> ${data.response}</div>`;
        box.scrollTop = box.scrollHeight;
    } catch(e) {
        box.innerHTML += `<div style="margin-bottom: 1rem; color: #EF4444;"><strong>System:</strong> Error connecting to AI.</div>`;
    }
}

document.getElementById('chat-input').addEventListener('keypress', function (e) {
    if (e.key === 'Enter') {
        sendMessage();
    }
});
</script>
{% endblock %}
