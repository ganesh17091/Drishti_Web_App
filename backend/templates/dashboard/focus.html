{% extends 'base.html' %}

{% block content %}
<div class="dashboard-grid">
    <div class="main-content" style="max-width: 600px; margin: 0 auto; text-align: center;">
        <h2>Focus Timer</h2>
        <p>Use the Pomodoro technique to boost your productivity.</p>
        <div class="card" style="background: var(--card-bg); padding: 5rem 3rem; border-radius: 12px; margin-top: 2rem;">
            <div id="timer" style="font-size: 6rem; font-weight: bold; color: var(--primary-color); margin-bottom: 3rem;">25:00</div>
            <button id="start-btn" onclick="startTimer()" class="btn-primary btn-large">Start Focus</button>
            <button id="stop-btn" onclick="stopTimer()" class="btn-secondary btn-large" style="display: none; border-color: #EF4444; color: #EF4444 !important;">Stop & Save</button>
        </div>
    </div>
</div>

<script>
let time = 25 * 60;
let timer = null;
let running = false;
let startSeconds = 0;

function updateDisplay() {
    const m = Math.floor(time / 60).toString().padStart(2, '0');
    const s = (time % 60).toString().padStart(2, '0');
    document.getElementById('timer').innerText = `${m}:${s}`;
}

function startTimer() {
    if(running) return;
    running = true;
    startSeconds = time;
    document.getElementById('start-btn').style.display = 'none';
    document.getElementById('stop-btn').style.display = 'inline-block';
    
    timer = setInterval(() => {
        if(time > 0) {
            time--;
            updateDisplay();
        } else {
            stopTimer();
            alert("Focus session complete! Great work.");
        }
    }, 1000);
}

async function stopTimer() {
    clearInterval(timer);
    running = false;
    document.getElementById('start-btn').style.display = 'inline-block';
    document.getElementById('start-btn').innerText = 'Resume';
    document.getElementById('stop-btn').style.display = 'none';
    
    const focusSeconds = startSeconds - time;
    if(focusSeconds > 60) {
        try {
            await fetch(`{{ url_for('study.save_focus_data') }}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({focus_hours: focusSeconds / 3600})
            });
            alert(`Saved ${(focusSeconds / 60).toFixed(1)} minutes of focus time!`);
        } catch(e) {
            console.error("Error saving focus data.");
        }
    }
}
</script>
{% endblock %}
