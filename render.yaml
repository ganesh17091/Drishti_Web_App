services:
  - type: web
    name: focuspath-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 2 --timeout 60 --log-level info
    envVars:
      - key: FLASK_APP
        value: wsgi.py
      - key: PYTHON_VERSION
        value: "3.11.0"
